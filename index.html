<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Gaming Update Radar</title>
    <style>
        /* Ein dunkles, cleanes Gaming-Design */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #00ff88;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .container {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .panel {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .steam-list {
            flex: 1;
        }
        .news-feed {
            flex: 2;
        }
        .game-item {
            background-color: #2a2a2a;
            padding: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #00ff88;
            border-radius: 4px;
        }
        .news-item {
            background-color: #2a2a2a;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            transition: transform 0.2s;
        }
        .news-item:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(0, 255, 136, 0.2);
        }
        .news-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .news-title a {
            color: #00ff88;
            text-decoration: none;
        }
        .news-title a:hover {
            text-decoration: underline;
        }
        .news-date {
            font-size: 0.8em;
            color: #aaa;
            margin-bottom: 10px;
        }
        button {
            background-color: #00ff88;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            display: block;
            margin: 20px auto;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #00cc6a;
        }
    </style>
</head>
<body>

    <h1>🎮 Mein Gaming Update Radar</h1>
    <button onclick="ladeDaten()">Daten jetzt aktualisieren</button>

    <div class="container">
        <div class="panel steam-list">
            <h2>Meine Watchlist</h2>
            <div id="games-container">Warte auf Daten...</div>
        </div>

        <div class="panel news-feed">
            <h2>Aktuelle News & Releases</h2>
            <div id="news-container">Warte auf Daten...</div>
        </div>
    </div>

    <script>
        // Dein NEUER Raw Link zur .json Datei!
        const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/Toxikologe/games-radar/main/dashboard_data.json'; 

        async function ladeDaten() {
            document.getElementById('games-container').innerHTML = "Lade Daten...";
            document.getElementById('news-container').innerHTML = "Lade News...";

            try {
                // Holt das fertig geschnürte Paket von GitHub
                const response = await fetch(GITHUB_RAW_URL);
                if (!response.ok) throw new Error("Fehler beim Laden von GitHub");
                
                // Da es jetzt eine JSON ist, können wir sie direkt als Objekt lesen
                const data = await response.json();
                
                // Spieleliste bauen
                document.getElementById('games-container').innerHTML = data.spiele.map(game => 
                    `<div class="game-item">${game}</div>`
                ).join('');

                // News bauen (keine API-Abfrage mehr nötig, News sind schon da!)
                if (data.news.length === 0) {
                    document.getElementById('news-container').innerHTML = "Keine News für heute gefunden.";
                } else {
                    document.getElementById('news-container').innerHTML = data.news.map(article => `
                        <div class="news-item">
                            <div class="news-title">
                                <a href="${article.url}" target="_blank">${article.title}</a>
                            </div>
                            <div class="news-date">${new Date(article.publishedAt).toLocaleDateString('de-DE')} - ${article.source.name}</div>
                            <div>${article.description || ""}</div>
                        </div>
                    `).join('');
                }

                // Zeigt das Datum des letzten Updates an (optional, sieht aber cool aus)
                console.log("Letztes Update:", data.letztesUpdate);

            } catch (error) {
                document.getElementById('games-container').innerHTML = "Fehler aufgetreten.";
                document.getElementById('news-container').innerHTML = "Fehler aufgetreten.";
                console.error(error);
            }
        }

        window.onload = ladeDaten;
    </script>
</body>
</html>
